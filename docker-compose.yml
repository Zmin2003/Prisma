services:
  backend:
    build: ./deepthink-backend
    container_name: prisma-backend
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - APP_API_KEY=${APP_API_KEY:-}
      - CREDENTIALS_ENC_KEY=${CREDENTIALS_ENC_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      - BASE_URL_ALLOWLIST=${BASE_URL_ALLOWLIST:-}
      - DATA_DIR=/app/data
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./deepthink
    container_name: prisma-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
