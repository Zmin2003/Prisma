services:
  frontend:
    build: .
    container_name: prisma-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ../deepthink-backend
    container_name: prisma-backend
    ports:
      - "8080:8080"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
